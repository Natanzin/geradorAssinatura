<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/9dd9d649b8.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Sudeco | Assiantura de E-mail</title>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        Dados
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Nome</label>
                            <input id="nome" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Cargo</label>
                            <input id="cargo" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Setor</label>
                            <input id="setor" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Ramal</label>
                            <input id="ramal" maxlength="4" placeholder="0000" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100" onclick="gerarHTML()">
                            Gerar HTML
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <h5>Pré-visualização</h5>
                <div id="assinatura">
                    <div class="nome" id="previewNome">
                        Nome Completo
                    </div>
                    <div class="cargo" id="previewCargo">
                        Cargo
                    </div>
                    <div class="setor" id="previewSetor">
                        Setor
                    </div>
                    <div class="ramal" id="previewRamal">
                        Telefone
                    </div>
                </div>
                <hr>
                <textarea id="codigo" class="form-control"></textarea>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
