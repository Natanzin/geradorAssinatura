<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/9dd9d649b8.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Sudeco | Assiantura de E-mail</title>
</head>

<body>
    <div class="container mt-3">
        <h2 class="text-center mb-3">Assinatura do E-mail</h2>
        <p class="text-center text-body-secondary small">🔒Este site não coleta nem armazena os dados informados pelo usuário. Todas as informações são processadas localmente no navegador.</p>
        <hr>
        <div class="row">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        Insira suas informações
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Nome</label>
                            <input id="nome" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Cargo</label>
                            <input id="cargo" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Setor</label>
                            <input id="setor" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Ramal</label>
                            <input id="ramal" maxlength="4" placeholder="0000" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100"
                            onclick="exportarDivComoJPG('assinatura', 'assinatura.jpg')">
                            Gerar Assinatura
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <h5>Pré-visualização</h5>
                <div id="assinatura">
                    <img src="./img/assinatura.png" class="bg">
                    <div class="conteudo">
                        <div class="nome" id="previewNome">
                            Nome Completo
                        </div>
                        <div class="cargo" id="previewCargo">
                            Cargo
                        </div>
                        <div class="setor" id="previewSetor">
                            Setor
                        </div>
                        <div class="ramal" id="previewRamal">
                            Telefone
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <img src="./img/regua-gov.png" alt="Régua do Governo Federal" class="imagem-fixa">
    <script src="script.js"></script>
</body>

</html>
